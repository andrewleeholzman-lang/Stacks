<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stacks — Curated Reading</title>
<meta name="theme-color" content="#1a1612">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Stacks">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --rule: #c8bfaa;
    --accent: #8b2000;
    --accent-light: #c94a1a;
    --muted: #6b6157;
    --shadow: rgba(26,22,18,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh; overflow-x: hidden;
  }

  /* MASTHEAD */
  .masthead {
    background: var(--ink); color: var(--paper);
    padding: 0 1rem; position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .masthead-inner {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 1rem; padding: 0.6rem 0;
  }
  .masthead-left { display: flex; align-items: center; gap: 0.75rem; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555; flex-shrink: 0; transition: background 0.3s;
  }
  .status-dot.loading { background: #e8a000; animation: pulse 1s infinite; }
  .status-dot.ready { background: #3a8a3a; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem,4vw,1.8rem); font-weight: 900;
    letter-spacing: -0.02em; color: var(--paper); line-height: 1;
  }
  .masthead-date {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    color: var(--rule); letter-spacing: 0.08em; text-transform: uppercase;
    display: block; margin-top: 2px;
  }
  .masthead-tagline {
    font-family: 'Source Serif 4', serif; font-style: italic;
    font-size: 0.75rem; color: var(--rule); text-align: center; opacity: 0.8;
  }
  .masthead-actions { display: flex; align-items: center; gap: 0.5rem; }
  .icon-btn {
    background: none; border: 1px solid rgba(200,191,170,0.3); color: var(--paper);
    width: 34px; height: 34px; border-radius: 4px; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .icon-btn:hover { background: rgba(139,32,0,0.4); border-color: var(--accent); }

  /* TAB BAR */
  .tab-bar-wrap {
    background: var(--ink); border-bottom: 1px solid rgba(200,191,170,0.15);
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .tab-bar-wrap::-webkit-scrollbar { display: none; }
  .tab-bar {
    max-width: 1100px; margin: 0 auto;
    display: flex; gap: 0.3rem; padding: 0.5rem 1rem; white-space: nowrap;
  }
  .tab-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 0.35rem 0.8rem; border-radius: 3px;
    border: 1px solid rgba(200,191,170,0.25); color: var(--rule);
    background: transparent; cursor: pointer; transition: all 0.18s ease;
    flex-shrink: 0; user-select: none;
  }
  .tab-pill:hover { border-color: var(--accent-light); color: var(--paper); }
  .tab-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* FEED */
  .feed-wrap { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .feed-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--rule);
  }
  .feed-meta-label {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  }
  .refresh-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: none; border: 1px solid var(--rule); color: var(--muted);
    padding: 0.3rem 0.7rem; border-radius: 3px; cursor: pointer; transition: all 0.18s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* CARD GRID */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(320px,100%),1fr));
    gap: 1.25rem;
  }

  /* CARD */
  .card {
    background: #fff; border: 1px solid var(--rule); border-radius: 4px;
    cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex; flex-direction: column; position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent); transform: scaleX(0); transform-origin: left;
    transition: transform 0.22s ease; z-index: 2;
  }
  .card:hover::before { transform: scaleX(1); }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px var(--shadow), 0 0 0 1px rgba(139,32,0,0.15);
  }

  /* card image */
  .card-img-wrap {
    width: 100%; height: 160px; overflow: hidden; flex-shrink: 0; position: relative;
    background: linear-gradient(135deg, var(--cream) 0%, #ddd6c8 100%);
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.3s ease;
  }
  .card:hover .card-img-wrap img { transform: scale(1.04); }
  .card-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .card-img-glyph {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem; opacity: 0.09; color: var(--ink); user-select: none;
    line-height: 1;
  }
  .card-img-source {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0.6rem 0.7rem 0.35rem;
    background: linear-gradient(transparent, rgba(20,16,12,0.72));
    font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
    font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(245,240,232,0.88);
  }

  /* card body */
  .card-body { padding: 1rem 1.1rem 0.9rem; display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
  .card-tags-row { display: flex; align-items: center; flex-wrap: wrap; gap: 0.3rem; }
  .card-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.2rem 0.5rem; border-radius: 2px; color: #fff;
  }
  .card-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.57rem; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 0.15rem 0.4rem; border-radius: 2px;
    background: rgba(139,32,0,0.09); color: var(--accent);
    border: 1px solid rgba(139,32,0,0.28);
  }
  .card-badge.pubmed { background: rgba(0,60,100,0.09); color: #003c64; border-color: rgba(0,60,100,0.28); }
  .card-badge.humanities { background: rgba(60,20,80,0.09); color: #3c1450; border-color: rgba(60,20,80,0.28); }
  .card-title {
    font-family: 'Playfair Display', serif; font-size: clamp(0.95rem,2.5vw,1.1rem);
    font-weight: 700; line-height: 1.3; color: var(--ink); letter-spacing: -0.01em;
  }
  .card-extract {
    font-family: 'Source Serif 4', serif; font-size: 0.855rem;
    line-height: 1.62; color: #3a342e; flex: 1;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 0.2rem; padding-top: 0.55rem; border-top: 1px solid var(--cream);
  }
  .card-meta-col { display: flex; flex-direction: column; gap: 0.06rem; }
  .card-readtime {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  }
  .card-byline { font-family: 'JetBrains Mono', monospace; font-size: 0.57rem; color: var(--muted); opacity: 0.75; }
  .card-arrow {
    font-size: 0.8rem; color: var(--accent); opacity: 0.5;
    transition: opacity 0.15s, transform 0.15s; flex-shrink: 0;
  }
  .card:hover .card-arrow { opacity: 1; transform: translateX(3px); }

  /* SKELETON */
  .skeleton { background: #fff; border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; pointer-events: none; }
  .skel-img { height: 160px; }
  .skel-body-wrap { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.7rem; }
  .skel {
    background: linear-gradient(90deg, var(--cream) 25%, #e8e3d8 50%, var(--cream) 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 3px;
  }
  .skel-tag{height:18px;width:72px}
  .skel-t1{height:20px;width:92%}
  .skel-t2{height:20px;width:60%}
  .skel-b1{height:13px;width:100%}
  .skel-b2{height:13px;width:85%}
  .skel-b3{height:13px;width:68%}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

  /* LOAD MORE */
  .load-more-wrap { text-align: center; margin-top: 2.5rem; }
  .load-more-btn {
    font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem;
    background: none; border: 2px solid var(--ink); color: var(--ink);
    padding: 0.7rem 2rem; border-radius: 3px; cursor: pointer; transition: all 0.2s;
  }
  .load-more-btn:hover { background: var(--ink); color: var(--paper); }
  .load-more-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* READER */
  .reader-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; background: var(--paper);
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
  }
  .reader-overlay.open { transform: translateY(0); }
  .reader-header {
    background: var(--ink); color: var(--paper);
    padding: 0.7rem 1rem; display: flex; align-items: center; gap: 1rem;
    flex-shrink: 0; border-bottom: 2px solid var(--accent);
  }
  .reader-back {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: none; border: 1px solid rgba(200,191,170,0.3); color: var(--paper);
    padding: 0.35rem 0.7rem; border-radius: 3px; cursor: pointer; white-space: nowrap;
    flex-shrink: 0; transition: background 0.18s;
  }
  .reader-back:hover { background: rgba(139,32,0,0.4); }
  .reader-title {
    font-family: 'Playfair Display', serif; font-size: clamp(0.85rem,2vw,1rem);
    font-weight: 700; color: var(--paper); flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .reader-ext-link {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--accent-light); text-decoration: none; white-space: nowrap;
    flex-shrink: 0; transition: color 0.15s;
  }
  .reader-ext-link:hover { color: #e86030; }
  .reader-iframe { flex: 1; border: none; width: 100%; }

  /* SETTINGS */
  .settings-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: var(--paper); display: none; flex-direction: column; overflow: hidden;
  }
  .settings-overlay.open { display: flex; }
  .settings-header {
    background: var(--ink); color: var(--paper);
    padding: 0.7rem 1rem; display: flex; align-items: center; gap: 1rem;
    flex-shrink: 0; border-bottom: 2px solid var(--accent);
  }
  .settings-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; flex: 1; }
  .settings-body { flex: 1; overflow-y: auto; padding: 1.5rem 1rem; max-width: 800px; margin: 0 auto; width: 100%; }
  .settings-section-title {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 1rem;
    padding-bottom: 0.4rem; border-bottom: 1px solid var(--rule);
  }
  .settings-tab-row {
    background: #fff; border: 1px solid var(--rule); border-radius: 4px;
    padding: 1rem; margin-bottom: 0.75rem;
  }
  .settings-tab-name-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
  .settings-name-input {
    font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700;
    border: none; border-bottom: 1px solid var(--rule); background: transparent;
    color: var(--ink); padding: 0.2rem 0.3rem; flex: 1; outline: none; transition: border-color 0.18s;
  }
  .settings-name-input:focus { border-color: var(--accent); }
  .settings-cats-input {
    font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; width: 100%;
    border: 1px solid var(--rule); border-radius: 3px; background: var(--paper);
    color: var(--ink); padding: 0.5rem 0.6rem; outline: none; resize: vertical;
    min-height: 70px; line-height: 1.6; transition: border-color 0.18s;
  }
  .settings-cats-input:focus { border-color: var(--accent); }
  .settings-cats-label {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); display: block;
    margin-bottom: 0.3rem; margin-top: 0.5rem;
  }
  .delete-tab-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    background: none; border: 1px solid #ddd; color: var(--muted);
    padding: 0.25rem 0.5rem; border-radius: 3px; cursor: pointer; transition: all 0.15s;
  }
  .delete-tab-btn:hover { border-color: #cc3333; color: #cc3333; }
  .add-tab-section {
    margin-top: 1.5rem; padding: 1rem;
    background: #fff; border: 1px dashed var(--rule); border-radius: 4px;
  }
  .add-tab-title { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; margin-bottom: 0.75rem; }
  .settings-input {
    font-family: 'Source Serif 4', serif; font-size: 0.875rem; width: 100%;
    border: 1px solid var(--rule); border-radius: 3px; background: var(--paper);
    color: var(--ink); padding: 0.45rem 0.6rem; outline: none;
    margin-bottom: 0.6rem; transition: border-color 0.18s;
  }
  .settings-input:focus { border-color: var(--accent); }
  .save-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--accent); border: none; color: #fff;
    padding: 0.55rem 1.25rem; border-radius: 3px; cursor: pointer; transition: background 0.18s;
  }
  .save-btn:hover { background: var(--accent-light); }
  .add-tab-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: none; border: 1px solid var(--ink); color: var(--ink);
    padding: 0.45rem 1rem; border-radius: 3px; cursor: pointer;
    transition: all 0.18s; margin-top: 0.5rem;
  }
  .add-tab-btn:hover { background: var(--ink); color: var(--paper); }

  /* API KEY SECTION */
  .api-key-section {
    background: #fff; border: 1px solid var(--rule); border-radius: 4px;
    padding: 1rem; margin-bottom: 1.5rem;
  }
  .api-key-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
  .api-key-input {
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; flex: 1;
    border: 1px solid var(--rule); border-radius: 3px; background: var(--paper);
    color: var(--ink); padding: 0.45rem 0.6rem; outline: none; transition: border-color 0.18s;
    letter-spacing: 0.04em;
  }
  .api-key-input:focus { border-color: var(--accent); }
  .api-key-save-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--ink); border: none; color: var(--paper);
    padding: 0.45rem 0.9rem; border-radius: 3px; cursor: pointer; transition: background 0.18s;
    white-space: nowrap;
  }
  .api-key-save-btn:hover { background: var(--accent); }
  .api-key-status {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em;
    margin-top: 0.4rem; color: var(--muted);
  }
  .api-key-status.ok { color: #3a8a3a; }
  .api-key-status.err { color: #cc3333; }

  /* AI CATEGORY STATUS BANNER */
  .ai-banner {
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--muted);
    padding: 0.3rem 0.6rem; background: rgba(139,32,0,0.06);
    border: 1px solid rgba(139,32,0,0.15); border-radius: 3px;
    display: inline-block; margin-bottom: 0.75rem;
  }

  /* HUMANITIES TOPIC SECTION */
  .humanities-topics-section { margin-top: 0.75rem; }
  .humanities-topic-row {
    display: flex; gap: 0.5rem; align-items: center;
    padding: 0.4rem 0; border-bottom: 1px solid var(--cream);
  }
  .humanities-topic-name {
    font-family: 'Source Serif 4', serif; font-size: 0.85rem; flex: 1; color: var(--ink);
  }
  .remove-topic-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
    background: none; border: 1px solid #ddd; color: var(--muted);
    padding: 0.2rem 0.4rem; border-radius: 3px; cursor: pointer; transition: all 0.15s;
  }
  .remove-topic-btn:hover { border-color: #cc3333; color: #cc3333; }
  .add-topic-row { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
  .topic-input {
    font-family: 'Source Serif 4', serif; font-size: 0.85rem; flex: 1;
    border: 1px solid var(--rule); border-radius: 3px; background: var(--paper);
    color: var(--ink); padding: 0.4rem 0.6rem; outline: none; transition: border-color 0.18s;
  }
  .topic-input:focus { border-color: var(--accent); }
  .add-topic-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    background: none; border: 1px solid var(--ink); color: var(--ink);
    padding: 0.4rem 0.8rem; border-radius: 3px; cursor: pointer; transition: all 0.18s;
  }
  .add-topic-btn:hover { background: var(--ink); color: var(--paper); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .empty-state p { font-style: italic; font-size: 1rem; }

  @media (max-width: 480px) {
    .masthead-tagline { display: none; }
    .feed-wrap { padding: 1rem 0.75rem 3rem; }
    .card-img-wrap { height: 130px; }
    .skel-img { height: 130px; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div class="masthead-left">
      <span class="status-dot" id="statusDot"></span>
      <div>
        <div class="masthead-title">The Stacks</div>
        <span class="masthead-date" id="mastheadDate"></span>
      </div>
    </div>
    <div class="masthead-tagline">Wikipedia & beyond — curated reading</div>
    <div class="masthead-actions">
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
    </div>
  </div>
</header>

<nav class="tab-bar-wrap">
  <div class="tab-bar" id="tabBar"></div>
</nav>

<main class="feed-wrap">
  <div class="feed-meta">
    <span class="feed-meta-label" id="feedLabel">Loading articles…</span>
    <button class="refresh-btn" id="refreshBtn">↺ Refresh</button>
  </div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="load-more-wrap">
    <button class="load-more-btn" id="loadMoreBtn">Load more articles</button>
  </div>
</main>

<div class="reader-overlay" id="readerOverlay">
  <div class="reader-header">
    <button class="reader-back" id="readerBack">← Feed</button>
    <div class="reader-title" id="readerTitle"></div>
    <a class="reader-ext-link" id="readerExtLink" target="_blank" rel="noopener">Source ↗</a>
  </div>
  <iframe class="reader-iframe" id="readerIframe"
    sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation"></iframe>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-header">
    <button class="reader-back" id="settingsClose">← Back</button>
    <div class="settings-title">Settings</div>
    <button class="save-btn" id="saveSettingsBtn">Save Changes</button>
  </div>
  <div class="settings-body" id="settingsBody"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// RSS SOURCES — fetched directly via CORS proxy (no rss2json key needed)

function loadState() {
  try {
    const saved = localStorage.getItem('stacks_tabs_v4');
    tabs = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_TABS));
    // Ensure special tabs always exist
    ['medical','humanities','astronomy','spaceflight'].forEach(id => {
      if (!tabs.find(t => t.id === id)) {
        const def = DEFAULT_TABS.find(t => t.id === id);
        if (def) tabs.push(JSON.parse(JSON.stringify(def)));
      }
    });
    const sa = localStorage.getItem('stacks_active_v4');
    activeTabs = sa
      ? new Set(JSON.parse(sa).filter(id => tabs.some(t => t.id === id)))
      : new Set();
    if (!activeTabs.size && tabs.length) activeTabs.add(tabs[0].id);
  } catch(e) {
    tabs = JSON.parse(JSON.stringify(DEFAULT_TABS));
    activeTabs = new Set([tabs[0].id]);
  }
}

function saveState() {
  localStorage.setItem('stacks_tabs_v4', JSON.stringify(tabs));
  localStorage.setItem('stacks_active_v4', JSON.stringify([...activeTabs]));
}

// ─────────────────────────────────────────────────────────────────────────────
// AI CATEGORY EXPANSION — daily refresh via Anthropic API
// ─────────────────────────────────────────────────────────────────────────────
function todayKey() { return new Date().toISOString().slice(0,10); }

async function refreshAICategories() {
  const key = getApiKey();
  if (!key) { console.log('[Stacks] No API key — skipping AI category refresh'); return; }

  const stored = localStorage.getItem('stacks_ai_cats_v1');
  if (stored) {
    const parsed = JSON.parse(stored);
    if (parsed.date === todayKey()) {
      console.log('[Stacks] AI categories already fresh for today');
      applyAICategories(parsed.cats);
      return;
    }
  }

  console.log('[Stacks] Fetching AI categories for today…');
  const wikiTabs = tabs.filter(t => !t.tabType);

  const prompt = `You are helping expand a curated Wikipedia reading app. For each topic tab below, generate 30-40 additional Wikipedia category names that complement the existing ones. These will be used to fetch random Wikipedia articles in that category. Categories must be real Wikipedia category names (use underscores, match Wikipedia's exact naming conventions). Emphasize specific events, movements, people, and phenomena — not broad overview categories. Focus on non-Western history, obscure but substantive topics, and areas adjacent to but not already covered by the existing list. Return ONLY a JSON object mapping tab IDs to arrays of category strings. No explanation, no markdown, no prose.

Tabs and their existing categories:
${wikiTabs.map(t => `"${t.id}" (${t.name}): [${t.categories.slice(0,8).join(', ')}...]`).join('\n')}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 4096,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) { console.log('[Stacks] AI API error', res.status); return; }
    const data = await res.json();
    const raw = data.content?.[0]?.text || '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) { console.log('[Stacks] AI returned no parseable JSON'); return; }
    const cats = JSON.parse(jsonMatch[0]);
    localStorage.setItem('stacks_ai_cats_v1', JSON.stringify({ date: todayKey(), cats }));
    applyAICategories(cats);
    console.log('[Stacks] AI categories applied');
  } catch(e) {
    console.log('[Stacks] AI category fetch failed:', e.message);
  }
}

function applyAICategories(cats) {
  tabs.forEach(tab => {
    if (tab.tabType) return;
    const aiCats = cats[tab.id];
    if (!Array.isArray(aiCats)) return;
    // Merge: static + AI, deduplicated
    const merged = [...new Set([...tab.categories, ...aiCats])];
    tab._mergedCategories = merged;
  });
}

function getEffectiveCategories(tab) {
  return tab._mergedCategories || tab.categories;
}

function setStatus(s) {
  const d = document.getElementById('statusDot');
  d.className = 'status-dot' + (s ? ' '+s : '');
}

function estimateReadTime(text) {
  return Math.max(1, Math.round((text||'').trim().split(/\s+/).length / 200)) + ' min read';
}

function trimSummary(text) {
  let c = text
    .replace(/\([^)]*\/[^)]*\/[^)]*\)/g, '')
    .replace(/\(\s*[a-zA-Z]{1,5}:\s*\/[^)]+\/[^)]*\)/g, '')
    .replace(/\s{2,}/g, ' ').trim();
  const sents = c.match(/[^.!?]+[.!?]+/g) || [c];
  return sents.slice(0, 3).join(' ').trim();
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';
  return (d.textContent || d.innerText || '').replace(/\s{2,}/g,' ').trim();
}

const SKIP_RX = [
  /^list of /i, /^index of /i, /^\d{4}$/, /disambiguation/i,
  /^(january|february|march|april|may|june|july|august|september|october|november|december)\b/i,
  /municipality/i, /\b(township|village|parish|borough) of\b/i,
  /^elections in\b/i, /^politics of\b/i,
  /^geography of\b/i, /^outline of\b/i, /^culture of\b/i,
  /^economy of\b/i, /\bdemography\b/i, /^demographics\b/i
];

function shouldSkip(title, extract) {
  if (!title || title.length < 5) return true;
  for (const rx of SKIP_RX) if (rx.test(title)) return true;
  if (!extract || extract.trim().length < 200) return true;
  return false;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function getTab(id) { return tabs.find(t => t.id === id); }
function getTabColor(id) { return getTab(id)?.color || '#333'; }
function getTabName(id) { return getTab(id)?.name || id; }

// ─────────────────────────────────────────────────────────────────────────────
// WIKIPEDIA API — with session-cached category members + parallel candidates
// ─────────────────────────────────────────────────────────────────────────────
const categoryMemberCache = {}; // session cache keyed by category name

async function fetchCategoryMembers(category) {
  if (categoryMemberCache[category]) return categoryMemberCache[category];
  const url = `https://en.wikipedia.org/w/api.php?action=query&list=categorymembers`
    + `&cmtitle=Category:${encodeURIComponent(category)}&cmlimit=80&cmtype=page&format=json&origin=*`;
  const data = await (await fetch(url)).json();
  const members = data?.query?.categorymembers || [];
  if (!members.length) console.log(`[Stacks] Zero members: Category:${category}`);
  categoryMemberCache[category] = members;
  return members;
}

async function fetchArticleData(title) {
  const url = `https://en.wikipedia.org/w/api.php?action=query`
    + `&prop=extracts|pageimages&exintro=true&explaintext=true`
    + `&piprop=thumbnail&pithumbsize=600`
    + `&titles=${encodeURIComponent(title)}&format=json&origin=*`;
  const data = await (await fetch(url)).json();
  const page = Object.values(data?.query?.pages || {})[0];
  return { extract: page?.extract || '', thumbnail: page?.thumbnail?.source || null };
}

async function fetchOneWikiArticle(tabId) {
  const tab = getTab(tabId);
  if (!tab?.categories?.length && !tab?._mergedCategories?.length) return null;
  const cats = getEffectiveCategories(tab);
  const category = pick(cats);
  let members;
  try { members = await fetchCategoryMembers(category); } catch(e) { return null; }
  if (!members.length) return null;

  // Pick up to 5 candidates and fetch them ALL in parallel — take first valid one
  const shuffled = [...members].sort(() => Math.random()-0.5).slice(0, 5);
  const results = await Promise.allSettled(shuffled.map(m => fetchArticleData(m.title)));

  for (let i = 0; i < results.length; i++) {
    if (results[i].status !== 'fulfilled') continue;
    const { extract, thumbnail } = results[i].value;
    if (shouldSkip(shuffled[i].title, extract)) continue;
    return {
      type: 'wiki', title: shuffled[i].title,
      extract: trimSummary(extract), thumbnail, tabId, category,
      readTime: estimateReadTime(extract),
      id: shuffled[i].pageid + '_' + Math.random()
    };
  }
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// RSS — direct fetch via CORS proxy, full XML parsing
// ─────────────────────────────────────────────────────────────────────────────
function parseRSSXML(xmlText, source) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'application/xml');

    // Check for parse error
    if (doc.querySelector('parsererror')) {
      console.log(`[Stacks] XML parse error for ${source.name}`);
      return [];
    }

    // Support both RSS <item> and Atom <entry>
    const items = [...doc.querySelectorAll('item, entry')];
    return items.map(item => {
      // Title — strip CDATA
      const title = (item.querySelector('title')?.textContent || '').trim();

      // Link — RSS uses text content, Atom uses href attribute
      let link = '';
      const linkEl = item.querySelector('link');
      if (linkEl) {
        link = linkEl.getAttribute('href') || linkEl.textContent?.trim() || '';
      }
      // Atom fallback: <link rel="alternate">
      if (!link) {
        const altLink = item.querySelector('link[rel="alternate"]');
        link = altLink?.getAttribute('href') || '';
      }

      // Description/content — try multiple selectors in order of preference
      let raw = '';
      const contentEncoded = item.getElementsByTagNameNS('http://purl.org/rss/1.0/modules/content/', 'encoded')[0];
      if (contentEncoded) {
        raw = stripHtml(contentEncoded.textContent || '');
      } else {
        const descEl = item.querySelector('description') || item.querySelector('summary') || item.querySelector('content');
        raw = stripHtml(descEl?.textContent || '');
      }
      const summary = raw.match(/[^.!?]+[.!?]+/g)?.slice(0,3).join(' ').trim() || raw.slice(0,300);

      // Thumbnail: try media:thumbnail, enclosure, then first img in content
      let thumb = null;
      const mediaThumbnail = item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'thumbnail')[0];
      if (mediaThumbnail) thumb = mediaThumbnail.getAttribute('url');

      if (!thumb) {
        const mediaContent = item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'content')[0];
        if (mediaContent && mediaContent.getAttribute('medium') === 'image') {
          thumb = mediaContent.getAttribute('url');
        }
      }
      if (!thumb) {
        const enc = item.querySelector('enclosure');
        if (enc && (enc.getAttribute('type') || '').startsWith('image')) thumb = enc.getAttribute('url');
      }
      if (!thumb) {
        // Search raw HTML of content for img src
        const contentEl = item.querySelector('content') || contentEncoded;
        const htmlStr = contentEl?.textContent || item.querySelector('description')?.textContent || '';
        const m = htmlStr.match(/<img[^>]+src=["']([^"']+)["']/i);
        if (m) thumb = m[1];
      }

      return {
        type: 'rss', title,
        extract: summary || title,
        thumbnail: thumb,
        url: link,
        sourceName: source.name,
        sourceColor: source.color,
        tabIds: source.tabIds || [],
        readTime: estimateReadTime(raw),
        id: 'rss_' + source.name + '_' + Math.random()
      };
    }).filter(a => a.title.length > 5 && (a.extract || a.title).length > 20);
  } catch(e) {
    console.log('[Stacks] XML parse error:', e.message);
    return [];
  }
}

async function fetchRSSSource(source) {
  if (rssCache[source.url]) return rssCache[source.url];

  // Try two different CORS proxies in sequence
  const proxies = [
    'https://corsproxy.io/?url=',
    'https://api.allorigins.win/raw?url='
  ];

  for (const proxy of proxies) {
    try {
      const proxyUrl = proxy + encodeURIComponent(source.url);
      const res = await fetch(proxyUrl);
      if (!res.ok) {
        console.log(`[Stacks] RSS HTTP ${res.status} via ${proxy}: ${source.name}`);
        continue;
      }
      const text = await res.text();
      if (!text || text.length < 100) { console.log(`[Stacks] RSS empty response: ${source.name}`); continue; }
      const items = parseRSSXML(text, source);
      if (!items.length) { console.log(`[Stacks] RSS parsed 0 items: ${source.name}`); continue; }
      console.log(`[Stacks] RSS ok: ${source.name} — ${items.length} items`);
      rssCache[source.url] = items;
      return items;
    } catch(e) {
      console.log(`[Stacks] RSS exception via ${proxy}: ${source.name}`, e.message);
    }
  }
  return [];
}

async function fetchOneRSSArticle(tabId) {
  const matching = RSS_SOURCES
    .filter(s => s.tabIds.includes(tabId))
    .sort(() => Math.random() - 0.5);
  if (!matching.length) return null;

  for (const source of matching) {
    const items = await fetchRSSSource(source);
    if (!items.length) continue;
    const seen = new Set(articles.filter(a => a.type === 'rss').map(a => a.title));
    const pool = items.filter(i => !seen.has(i.title));
    const item = pick(pool.length ? pool : items);
    return { ...item, tabId, id: 'rss_'+tabId+'_'+Math.random() };
  }

  const allSources = [...RSS_SOURCES].sort(() => Math.random() - 0.5);
  for (const source of allSources) {
    const items = await fetchRSSSource(source);
    if (!items.length) continue;
    const seen = new Set(articles.filter(a => a.type === 'rss').map(a => a.title));
    const pool = items.filter(i => !seen.has(i.title));
    if (!pool.length) continue;
    return { ...pick(pool), tabId, id: 'rss_'+tabId+'_'+Math.random() };
  }
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// PUBMED — NLM E-utilities API
// ─────────────────────────────────────────────────────────────────────────────
async function fetchPubMedArticles() {
  if (pubmedCache.fetched && pubmedCache.items.length) return pubmedCache.items;
  try {
    // Pick 4 random search terms and run them in parallel for variety
    const selectedTerms = [...PUBMED_SEARCH_TERMS].sort(() => Math.random()-0.5).slice(0, 4);

    const searchResults = await Promise.allSettled(selectedTerms.map(async term => {
      const url = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi`
        + `?db=pubmed&term=${encodeURIComponent(term + '[Title/Abstract]')}`
        + `&sort=pub+date&retmax=20&retmode=json&datetype=pdat&reldate=365`;
      const res = await fetch(url);
      const data = await res.json();
      return data?.esearchresult?.idlist || [];
    }));

    // Combine and deduplicate IDs
    const allIds = [...new Set(
      searchResults.flatMap(r => r.status === 'fulfilled' ? r.value : [])
    )].slice(0, 60);

    if (!allIds.length) return [];

    // Fetch summaries
    const summaryUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi`
      + `?db=pubmed&id=${allIds.join(',')}&retmode=json`;
    const summaryRes = await fetch(summaryUrl);
    const summaryData = await summaryRes.json();
    const result = summaryData?.result || {};

    // Fetch abstracts in batch (first 40)
    const fetchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi`
      + `?db=pubmed&id=${allIds.slice(0,40).join(',')}&rettype=abstract&retmode=xml`;
    const fetchRes = await fetch(fetchUrl);
    const xmlText = await fetchRes.text();
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
    const abstractMap = {};
    xmlDoc.querySelectorAll('PubmedArticle').forEach(art => {
      const pmid = art.querySelector('PMID')?.textContent;
      const abstractTexts = [...art.querySelectorAll('AbstractText')].map(el => el.textContent).join(' ');
      if (pmid && abstractTexts) abstractMap[pmid] = abstractTexts;
    });

    const items = allIds.map(id => {
      const s = result[id];
      if (!s || !s.title) return null;
      const abstract = abstractMap[id] || '';
      const extract = abstract ? trimSummary(abstract) : s.title;
      return {
        type: 'pubmed',
        title: s.title,
        extract: extract || 'No abstract available.',
        thumbnail: null,
        url: `https://pubmed.ncbi.nlm.nih.gov/${id}/`,
        sourceName: s.fulljournalname || s.source || 'PubMed',
        sourceColor: '#003c64',
        tabId: 'medical',
        readTime: estimateReadTime(abstract || s.title),
        pmid: id,
        pubDate: s.pubdate || '',
        authors: (s.authors || []).slice(0,3).map(a => a.name).join(', '),
        id: 'pubmed_' + id
      };
    }).filter(Boolean).filter(a => a.title.length > 10);

    pubmedCache.items = items;
    pubmedCache.fetched = true;
    console.log(`[Stacks] PubMed: ${items.length} articles loaded`);
    return items;
  } catch(e) {
    console.log('[Stacks] PubMed fetch failed:', e.message);
    return [];
  }
}

async function fetchOnePubMedArticle() {
  const items = await fetchPubMedArticles();
  if (!items.length) return null;
  const seen = new Set(articles.filter(a => a.type === 'pubmed').map(a => a.pmid));
  const pool = items.filter(i => !seen.has(i.pmid));
  return pool.length ? pick(pool) : pick(items);
}

// ─────────────────────────────────────────────────────────────────────────────
// HUMANITIES RSS
// ─────────────────────────────────────────────────────────────────────────────
async function fetchHumanitiesRSS() {
  const humanitiesTab = getTab('humanities');
  const topics = humanitiesTab?.topics || [];

  // Pick 2-3 random sources, fetch them
  const shuffled = [...HUMANITIES_RSS_SOURCES].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, 3);

  const allItems = [];
  for (const source of selected) {
    const items = await fetchRSSSource({...source, tabIds: ['humanities']});
    allItems.push(...items.map(i => ({
      ...i, tabId: 'humanities', sourceColor: source.color,
      type: 'humanities'
    })));
  }

  // If we have topics and an API key, try to filter/match by topic keywords
  if (topics.length && allItems.length) {
    const topicWords = topics.flatMap(t => t.toLowerCase().split(/\s+/));
    const scored = allItems.map(a => {
      const text = (a.title + ' ' + a.extract).toLowerCase();
      const score = topicWords.filter(w => text.includes(w)).length;
      return { ...a, _score: score };
    });
    scored.sort((a,b) => b._score - a._score);
    return scored;
  }
  return allItems;
}

async function fetchOneHumanitiesArticle() {
  const items = await fetchHumanitiesRSS();
  if (!items.length) return null;
  const seen = new Set(articles.filter(a => a.type === 'humanities').map(a => a.title));
  const pool = items.filter(i => !seen.has(i.title));
  return pool.length ? pick(pool) : pick(items);
}

// ─────────────────────────────────────────────────────────────────────────────
// BATCH FETCH
// ─────────────────────────────────────────────────────────────────────────────
async function fetchBatch(count = 6) {
  const activeList = [...activeTabs];
  if (!activeList.length) return [];

  const hasMedical = activeList.includes('medical');
  const hasHumanities = activeList.includes('humanities');
  const wikiTabIds = activeList.filter(id => {
    const t = getTab(id);
    return !t?.tabType;
  });

  const promises = [];

  // Always try 2 general RSS slots from wiki tabs
  const rssEligible = wikiTabIds.filter(id => RSS_SOURCES.some(s => s.tabIds.includes(id)));
  if (rssEligible.length) {
    promises.push(fetchOneRSSArticle(pick(rssEligible)));
    promises.push(fetchOneRSSArticle(pick(rssEligible)));
  }

  // Medical slots
  if (hasMedical) {
    promises.push(fetchOnePubMedArticle());
    if (count >= 6) promises.push(fetchOnePubMedArticle());
  }

  // Humanities slots
  if (hasHumanities) {
    promises.push(fetchOneHumanitiesArticle());
    if (count >= 6) promises.push(fetchOneHumanitiesArticle());
  }

  // Fill remaining with Wikipedia
  const wikiCount = Math.max(2, count - promises.length + 2);
  const wikiCycled = Array.from({length: wikiCount}, (_, i) =>
    wikiTabIds.length ? wikiTabIds[i % wikiTabIds.length] : null
  ).filter(Boolean);

  const allPromises = [
    ...promises,
    ...wikiCycled.map(id => fetchOneWikiArticle(id))
  ];

  const results = await Promise.allSettled(allPromises);
  const good = results
    .filter(r => r.status === 'fulfilled' && r.value)
    .map(r => r.value);

  // Deduplicate by title
  const seen = new Set();
  const deduped = good.filter(a => {
    if (seen.has(a.title)) return false;
    seen.add(a.title); return true;
  });

  return deduped.slice(0, count);
}

// ─────────────────────────────────────────────────────────────────────────────
// PRE-FETCH QUEUE — silently fills next batch while user reads
// ─────────────────────────────────────────────────────────────────────────────
let prefetchedBatch = null;
let prefetchInProgress = false;

async function prefetchNextBatch() {
  if (prefetchInProgress || prefetchedBatch) return;
  prefetchInProgress = true;
  try {
    prefetchedBatch = await fetchBatch(6);
  } catch(e) {
    prefetchedBatch = null;
  }
  prefetchInProgress = false;
}

async function getNextBatch() {
  if (prefetchedBatch && prefetchedBatch.length) {
    const batch = prefetchedBatch;
    prefetchedBatch = null;
    // Start pre-fetching the one after this immediately
    setTimeout(prefetchNextBatch, 300);
    return batch;
  }
  return fetchBatch(6);
}

function makeCard(article) {
  const card = document.createElement('div');
  card.className = 'card';

  const isPubMed = article.type === 'pubmed';
  const isHumanities = article.type === 'humanities';
  const isRSS = article.type === 'rss';
  const tabColor = isPubMed ? '#003c64' : isHumanities ? '#3c1450' : isRSS ? (article.sourceColor || '#333') : getTabColor(article.tabId);
  const tabName = getTabName(article.tabId);
  const glyph = TAB_GLYPHS[article.tabId] || '◆';
  const isRecent = isRSS || isPubMed || isHumanities || RECENT_CATS.has(article.category);

  // Image block
  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img-wrap';

  if (article.thumbnail) {
    const img = document.createElement('img');
    img.src = article.thumbnail;
    img.alt = article.title;
    img.loading = 'lazy';
    img.onerror = () => {
      imgWrap.innerHTML = `<div class="card-img-placeholder"><span class="card-img-glyph">${glyph}</span></div>`;
      if (isRSS || isPubMed || isHumanities) addSourceStripe(imgWrap, article.sourceName);
    };
    imgWrap.appendChild(img);
  } else {
    imgWrap.innerHTML = `<div class="card-img-placeholder"><span class="card-img-glyph">${glyph}</span></div>`;
  }

  if (isRSS || isPubMed || isHumanities) addSourceStripe(imgWrap, article.sourceName);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  const tagsRow = document.createElement('div');
  tagsRow.className = 'card-tags-row';

  const tag = document.createElement('span');
  tag.className = 'card-tag';
  tag.style.background = tabColor;
  tag.textContent = tabName;
  tagsRow.appendChild(tag);

  if (isRecent) {
    const badge = document.createElement('span');
    badge.className = 'card-badge' + (isPubMed ? ' pubmed' : isHumanities ? ' humanities' : '');
    if (isPubMed) badge.textContent = 'PubMed';
    else if (isHumanities) badge.textContent = 'Journal';
    else if (isRSS) badge.textContent = 'Live';
    else badge.textContent = 'Recent';
    tagsRow.appendChild(badge);
  }

  if (isPubMed && article.pubDate) {
    const dateBadge = document.createElement('span');
    dateBadge.className = 'card-badge pubmed';
    dateBadge.textContent = article.pubDate.slice(0,4);
    tagsRow.appendChild(dateBadge);
  }

  const titleEl = document.createElement('div');
  titleEl.className = 'card-title';
  titleEl.textContent = article.title;

  const extractEl = document.createElement('div');
  extractEl.className = 'card-extract';
  extractEl.textContent = article.extract;

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  const metaCol = document.createElement('div');
  metaCol.className = 'card-meta-col';
  const rt = document.createElement('span');
  rt.className = 'card-readtime';
  rt.textContent = article.readTime;
  metaCol.appendChild(rt);

  if (isPubMed && article.authors) {
    const byline = document.createElement('span');
    byline.className = 'card-byline';
    byline.textContent = article.authors;
    metaCol.appendChild(byline);
  } else if ((isRSS || isHumanities) && article.sourceName) {
    const byline = document.createElement('span');
    byline.className = 'card-byline';
    byline.textContent = article.sourceName;
    metaCol.appendChild(byline);
  }

  const arrow = document.createElement('span');
  arrow.className = 'card-arrow';
  arrow.textContent = '→';
  footer.appendChild(metaCol);
  footer.appendChild(arrow);

  body.appendChild(tagsRow);
  body.appendChild(titleEl);
  body.appendChild(extractEl);
  body.appendChild(footer);

  card.appendChild(imgWrap);
  card.appendChild(body);
  card.addEventListener('click', () => openReader(article));
  return card;
}

function addSourceStripe(imgWrap, name) {
  const stripe = document.createElement('div');
  stripe.className = 'card-img-source';
  stripe.textContent = name;
  imgWrap.appendChild(stripe);
}

function appendArticles(newArticles) {
  const grid = document.getElementById('cardGrid');
  newArticles.forEach(a => { grid.appendChild(makeCard(a)); articles.push(a); });
}

async function refreshFeed() {
  if (isLoading) return;
  isLoading = true; articles = [];
  prefetchedBatch = null; // clear stale pre-fetch on refresh
  setStatus('loading');
  document.getElementById('feedLabel').textContent = 'Loading articles…';
  document.getElementById('loadMoreBtn').disabled = true;
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  renderSkeletons(6);
  const batch = await fetchBatch(6);
  removeSkeletons();
  if (!activeTabs.size) {
    grid.innerHTML = '<div class="empty-state"><p>Select at least one topic tab above.</p></div>';
    setStatus(''); isLoading = false;
    document.getElementById('loadMoreBtn').disabled = false;
    document.getElementById('feedLabel').textContent = 'No topics selected';
    return;
  }
  appendArticles(batch);
  const n = articles.length;
  document.getElementById('feedLabel').textContent = `${n} article${n!==1?'s':''} loaded`;
  setStatus('ready'); isLoading = false;
  document.getElementById('loadMoreBtn').disabled = false;
  // Start silently pre-fetching the next batch
  setTimeout(prefetchNextBatch, 500);
}

async function loadMore() {
  if (isLoading) return;
  isLoading = true; setStatus('loading');
  document.getElementById('loadMoreBtn').disabled = true;
  document.getElementById('loadMoreBtn').textContent = 'Loading…';
  renderSkeletons(6);
  const batch = await getNextBatch();
  removeSkeletons();
  appendArticles(batch);
  const n = articles.length;
  document.getElementById('feedLabel').textContent = `${n} article${n!==1?'s':''} loaded`;
  setStatus('ready'); isLoading = false;
  document.getElementById('loadMoreBtn').disabled = false;
  document.getElementById('loadMoreBtn').textContent = 'Load more articles';
  // Pre-fetch again for next load more
  setTimeout(prefetchNextBatch, 300);
}

  if (article.type === 'pubmed') {

    link.href = article.url || '#';
    link.textContent = (article.sourceName || 'Source') + ' ↗';
    iframe.src = article.url || '';
  } else {
    link.href = `https://en.wikipedia.org/wiki/${encodeURIComponent(article.title)}`;
    link.textContent = 'Wikipedia ↗';
    iframe.src = `https://en.m.wikipedia.org/wiki/${encodeURIComponent(article.title)}`;

  document.getElementById('readerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

  addSection.className = 'add-tab-section';
  addSection.innerHTML = `<div class="add-tab-title">Add New Tab</div>
    <input class="settings-input" id="newTabName" type="text" placeholder="Tab name (e.g. Maritime)">
    <label class="settings-cats-label">Wikipedia categories (comma-separated)</label>
    <textarea class="settings-cats-input" id="newTabCats" style="min-height:55px"
      placeholder="Maritime_history, Piracy, Naval_battles"></textarea><br>
    <button class="add-tab-btn" id="addTabBtn">+ Add Tab</button>`;
  body.appendChild(addSection);

  document.getElementById('addTabBtn').addEventListener('click', () => {
    const name = document.getElementById('newTabName').value.trim();
    const cats = document.getElementById('newTabCats').value.trim();
    if (!name || !cats) return;
    const colors = ['#4a1010','#003355','#104410','#2a0a4a','#3a2200','#002240','#1a1a10'];
    tabs.push({ id: 'tab_'+Date.now(), name, color: colors[tabs.length % colors.length],
      categories: cats.split(',').map(c=>c.trim()).filter(Boolean) });
    activeTabs.add(tabs[tabs.length-1].id);
    renderSettings();
  });
}

function collectSettingsData() {
  return [...document.querySelectorAll('.settings-tab-row')].map(row => {
    const orig = tabs[parseInt(row.dataset.idx)];
    if (!orig) return null;
    return { ...orig,
      name: row.querySelector('[data-field="name"]')?.value.trim() || orig.name,
      categories: row.querySelector('[data-field="categories"]')
        ?.value.split(',').map(c=>c.trim()).filter(Boolean) || orig.categories
    };
  }).filter(Boolean);
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENTS + INIT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('readerBack').addEventListener('click', closeReader);
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsClose').addEventListener('click', closeSettings);
document.getElementById('refreshBtn').addEventListener('click', refreshFeed);
document.getElementById('loadMoreBtn').addEventListener('click', loadMore);
document.getElementById('saveSettingsBtn').addEventListener('click', () => {
  const wikiTabs = collectSettingsData();
  // Preserve special tabs
  const specialTabs = tabs.filter(t => t.tabType);
  tabs = [...wikiTabs, ...specialTabs];
  const valid = new Set(tabs.map(t=>t.id));
  activeTabs = new Set([...activeTabs].filter(id => valid.has(id)));
  if (!activeTabs.size && tabs.length) activeTabs.add(tabs[0].id);
  saveState(); closeSettings(); renderTabBar(); refreshFeed();
});
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('settingsOverlay').classList.contains('open')) closeSettings();
  else closeReader();
});

(async function init() {
  document.getElementById('mastheadDate').textContent = new Date().toLocaleDateString('en-US',{
    weekday:'short', year:'numeric', month:'short', day:'numeric'
  });
  // Register service worker for PWA install support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  loadState();
  renderTabBar();
  // Kick off AI category refresh in background (non-blocking)
  refreshAICategories().then(() => renderTabBar());
  refreshFeed();
})();
</script>
</body>
</html>
