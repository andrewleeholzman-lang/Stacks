<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stacks — Curated Reading</title>
<meta name="theme-color" content="#1a1612">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Stacks">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --rule: #c8bfaa;
    --accent: #8b2000;
    --accent-light: #c94a1a;
    --muted: #6b6157;
    --shadow: rgba(26,22,18,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh; overflow-x: hidden;
  }

  /* MASTHEAD */
  .masthead {
    background: var(--ink); color: var(--paper);
    padding: 0 1rem; position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .masthead-inner {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 1rem; padding: 0.6rem 0;
  }
  .masthead-left { display: flex; align-items: center; gap: 0.75rem; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555; flex-shrink: 0; transition: background 0.3s;
  }
  .status-dot.loading { background: #e8a000; animation: pulse 1s infinite; }
  .status-dot.ready { background: #3a8a3a; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem,4vw,1.8rem); font-weight: 900;
    letter-spacing: -0.02em; color: var(--paper); line-height: 1;
  }
  .masthead-date {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    color: var(--rule); letter-spacing: 0.08em; text-transform: uppercase;
    display: block; margin-top: 2px;
  }
  .masthead-tagline {
    font-family: 'Source Serif 4', serif; font-style: italic;
    font-size: 0.72rem; color: var(--rule); text-align: center; opacity: 0.85;
    display: flex; flex-direction: column; align-items: center; gap: 0.1rem;
  }
  .masthead-subtitle {
    font-family: 'JetBrains Mono', monospace; font-style: normal;
    font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent-light); opacity: 0.9;
  }
  .masthead-quote {
    font-family: 'Source Serif 4', serif; font-style: italic;
    font-size: 0.68rem; color: var(--rule); opacity: 0.75;
    max-width: 340px; line-height: 1.4;
    animation: fadein 1.2s ease;
  }
  .masthead-quote-attr {
    font-family: 'JetBrains Mono', monospace; font-style: normal;
    font-size: 0.55rem; letter-spacing: 0.07em; color: var(--muted);
    margin-top: 0.05rem;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 0.75; } }

  /* MOBILE QUOTE BANNER — shown only on small screens */
  .quote-banner {
    display: none; background: var(--ink);
    border-bottom: 1px solid rgba(200,191,170,0.12);
    padding: 0.4rem 1rem; text-align: center;
  }
  .quote-banner-text {
    font-family: 'Source Serif 4', serif; font-style: italic;
    font-size: 0.68rem; color: var(--rule); opacity: 0.8; line-height: 1.4;
  }
  .quote-banner-attr {
    font-family: 'JetBrains Mono', monospace; font-size: 0.52rem;
    letter-spacing: 0.07em; color: var(--muted); display: block; margin-top: 0.15rem;
  }

  /* BEAUTY TILES */
  .card.beauty-tile { background: var(--ink); border-color: rgba(200,191,170,0.2); }
  .card.beauty-tile::before { background: var(--accent-light); }
  .card.beauty-tile:hover { box-shadow: 0 8px 24px rgba(26,22,18,0.4), 0 0 0 1px rgba(201,74,26,0.3); }
  .beauty-art-img { width:100%; height:200px; object-fit:cover; display:block; transition:transform 0.3s ease; }
  .card.beauty-tile:hover .beauty-art-img { transform:scale(1.03); }
  .beauty-body { padding:1rem 1.1rem 0.9rem; display:flex; flex-direction:column; gap:0.5rem; flex:1; }
  .beauty-label { font-family:'JetBrains Mono',monospace; font-size:0.58rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent-light); opacity:0.9; }
  .beauty-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; line-height:1.3; color:var(--paper); }
  .beauty-meta { font-family:'JetBrains Mono',monospace; font-size:0.58rem; color:var(--rule); opacity:0.7; letter-spacing:0.04em; margin-top:0.15rem; line-height:1.5; }
  .beauty-poem { font-family:'Source Serif 4',serif; font-style:italic; font-size:0.88rem; line-height:1.7; color:var(--paper); opacity:0.9; flex:1; white-space:pre-line; }
  .beauty-quote-text { font-family:'Playfair Display',serif; font-style:italic; font-size:1.05rem; line-height:1.5; color:var(--paper); flex:1; }
  .beauty-quote-attr { font-family:'JetBrains Mono',monospace; font-size:0.6rem; letter-spacing:0.08em; color:var(--accent-light); margin-top:0.3rem; }

  /* VIDEO CARDS */
  .card.video-card::before { background: #006655; }
  .tab-pill.video-tab { border-color:rgba(0,140,120,0.4); color:#4ecdc4; }
  .tab-pill.video-tab.active { background:#006655; border-color:#006655; color:#fff; }
  .video-thumb-wrap { width:100%; height:180px; overflow:hidden; flex-shrink:0; position:relative; background:#000; }
  .video-thumb { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s ease; opacity:0.85; }
  .card.video-card:hover .video-thumb { transform:scale(1.04); opacity:1; }
  .video-play-btn {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:48px; height:48px; border-radius:50%;
    background:rgba(0,102,85,0.85); display:flex; align-items:center; justify-content:center;
    font-size:1.2rem; color:#fff; pointer-events:none; transition:background 0.2s, transform 0.2s;
  }
  .card.video-card:hover .video-play-btn { background:#006655; transform:translate(-50%,-50%) scale(1.1); }
  .card-badge.video { background:rgba(0,102,85,0.09); color:#006655; border-color:rgba(0,102,85,0.28); }

  .tab-pill-all {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 0.35rem 0.8rem; border-radius: 3px;
    border: 1px solid rgba(200,191,170,0.5); color: var(--paper);
    background: transparent; cursor: pointer; transition: all 0.18s ease;
    flex-shrink: 0; user-select: none;
  }
  .tab-pill-all:hover { border-color: var(--accent-light); background: rgba(139,32,0,0.2); }
  .tab-pill-all.all-active { background: rgba(200,191,170,0.15); border-color: rgba(200,191,170,0.6); }
  .masthead-actions { display: flex; align-items: center; gap: 0.5rem; }
  .icon-btn {
    background: none; border: 1px solid rgba(200,191,170,0.3); color: var(--paper);
    width: 34px; height: 34px; border-radius: 4px; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .icon-btn:hover { background: rgba(139,32,0,0.4); border-color: var(--accent); }

  /* TAB BAR */
  .tab-bar-wrap {
    background: var(--ink); border-bottom: 1px solid rgba(200,191,170,0.15);
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .tab-bar-wrap::-webkit-scrollbar { display: none; }
  .tab-bar {
    max-width: 1100px; margin: 0 auto;
    display: flex; gap: 0.3rem; padding: 0.5rem 1rem; white-space: nowrap;
  }
  .tab-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 0.35rem 0.8rem; border-radius: 3px;
    border: 1px solid rgba(200,191,170,0.25); color: var(--rule);
    background: transparent; cursor: pointer; transition: all 0.18s ease;
    flex-shrink: 0; user-select: none;
  }
  .tab-pill:hover { border-color: var(--accent-light); color: var(--paper); }
  .tab-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* FEED */
  .feed-wrap { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .feed-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--rule);
  }
  .feed-meta-label {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  }
  .refresh-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: none; border: 1px solid var(--rule); color: var(--muted);
    padding: 0.3rem 0.7rem; border-radius: 3px; cursor: pointer; transition: all 0.18s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* CARD GRID */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(320px,100%),1fr));
    gap: 1.25rem;
  }

  /* CARD */
  .card {
    background: #fff; border: 1px solid var(--rule); border-radius: 4px;
    cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex; flex-direction: column; position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent); transform: scaleX(0); transform-origin: left;
    transition: transform 0.22s ease; z-index: 2;
  }
  .card:hover::before { transform: scaleX(1); }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px var(--shadow), 0 0 0 1px rgba(139,32,0,0.15);
  }

  /* card image */
  .card-img-wrap {
    width: 100%; height: 160px; overflow: hidden; flex-shrink: 0; position: relative;
    background: linear-gradient(135deg, var(--cream) 0%, #ddd6c8 100%);
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.3s ease;
  }
  .card:hover .card-img-wrap img { transform: scale(1.04); }
  .card-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .card-img-glyph {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem; opacity: 0.09; color: var(--ink); user-select: none;
    line-height: 1;
  }
  .card-img-source {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0.6rem 0.7rem 0.35rem;
    background: linear-gradient(transparent, rgba(20,16,12,0.72));
    font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
    font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(245,240,232,0.88);
  }

  /* card body */
  .card-body { padding: 1rem 1.1rem 0.9rem; display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
  .card-tags-row { display: flex; align-items: center; flex-wrap: wrap; gap: 0.3rem; }
  .card-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.2rem 0.5rem; border-radius: 2px; color: #fff;
  }
  .card-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.57rem; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 0.15rem 0.4rem; border-radius: 2px;
    background: rgba(139,32,0,0.09); color: var(--accent);
    border: 1px solid rgba(139,32,0,0.28);
  }
  .card-badge.pubmed { background: rgba(0,60,100,0.09); color: #003c64; border-color: rgba(0,60,100,0.28); }
  .card-badge.humanities { background: rgba(60,20,80,0.09); color: #3c1450; border-color: rgba(60,20,80,0.28); }
  .card-title {
    font-family: 'Playfair Display', serif; font-size: clamp(0.95rem,2.5vw,1.1rem);
    font-weight: 700; line-height: 1.3; color: var(--ink); letter-spacing: -0.01em;
  }
  .card-extract {
    font-family: 'Source Serif 4', serif; font-size: 0.855rem;
    line-height: 1.62; color: #3a342e; flex: 1;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 0.2rem; padding-top: 0.55rem; border-top: 1px solid var(--cream);
  }
  .card-meta-col { display: flex; flex-direction: column; gap: 0.06rem; }
  .card-readtime {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  }
  .card-byline { font-family: 'JetBrains Mono', monospace; font-size: 0.57rem; color: var(--muted); opacity: 0.75; }
  .card-arrow {
    font-size: 0.8rem; color: var(--accent); opacity: 0.5;
    transition: opacity 0.15s, transform 0.15s; flex-shrink: 0;
  }
  .card:hover .card-arrow { opacity: 1; transform: translateX(3px); }

  /* SKELETON */
  .skeleton { background: #fff; border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; pointer-events: none; }
  .skel-img { height: 160px; }
  .skel-body-wrap { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.7rem; }
  .skel {
    background: linear-gradient(90deg, var(--cream) 25%, #e8e3d8 50%, var(--cream) 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 3px;
  }
  .skel-tag{height:18px;width:72px}
  .skel-t1{height:20px;width:92%}
  .skel-t2{height:20px;width:60%}
  .skel-b1{height:13px;width:100%}
  .skel-b2{height:13px;width:85%}
  .skel-b3{height:13px;width:68%}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

  /* LOAD MORE */
  .load-more-wrap { text-align: center; margin-top: 2.5rem; }
  .load-more-btn {
    font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem;
    background: none; border: 2px solid var(--ink); color: var(--ink);
    padding: 0.7rem 2rem; border-radius: 3px; cursor: pointer; transition: all 0.2s;
  }
  .load-more-btn:hover { background: var(--ink); color: var(--paper); }
  .load-more-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* READER */
  .reader-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; background: var(--paper);
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
  }
  .reader-overlay.open { transform: translateY(0); }
  .reader-header {
    background: var(--ink); color: var(--paper);
    padding: 0.7rem 1rem; display: flex; align-items: center; gap: 1rem;
    flex-shrink: 0; border-bottom: 2px solid var(--accent);
  }
  .reader-back {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: none; border: 1px solid rgba(200,191,170,0.3); color: var(--paper);
    padding: 0.35rem 0.7rem; border-radius: 3px; cursor: pointer; white-space: nowrap;
    flex-shrink: 0; transition: background 0.18s;
  }
  .reader-back:hover { background: rgba(139,32,0,0.4); }
  .reader-title {
    font-family: 'Playfair Display', serif; font-size: clamp(0.85rem,2vw,1rem);
    font-weight: 700; color: var(--paper); flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .reader-ext-link {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--accent-light); text-decoration: none; white-space: nowrap;
    flex-shrink: 0; transition: color 0.15s;
  }
  .reader-ext-link:hover { color: #e86030; }
  .reader-iframe { flex: 1; border: none; width: 100%; }

  /* SETTINGS */
  .settings-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: var(--paper); display: none; flex-direction: column; overflow: hidden;
  }
  .settings-overlay.open { display: flex; }
  .settings-header {
    background: var(--ink); color: var(--paper);
    padding: 0.7rem 1rem; display: flex; align-items: center; gap: 1rem;
    flex-shrink: 0; border-bottom: 2px solid var(--accent);
  }
  .settings-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; flex: 1; }
  .settings-body { flex: 1; overflow-y: auto; padding: 1.5rem 1rem; max-width: 800px; margin: 0 auto; width: 100%; }
  .settings-section-title {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 1rem;
    padding-bottom: 0.4rem; border-bottom: 1px solid var(--rule);
  }
  .settings-tab-row {
    background: #fff; border: 1px solid var(--rule); border-radius: 4px;
    padding: 1rem; margin-bottom: 0.75rem;
  }
  .settings-tab-name-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
  .settings-name-input {
    font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700;
    border: none; border-bottom: 1px solid var(--rule); background: transparent;
    color: var(--ink); padding: 0.2rem 0.3rem; flex: 1; outline: none; transition: border-color 0.18s;
  }
  .settings-name-input:focus { border-color: var(--accent); }
  .settings-cats-input {
    font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; width: 100%;
    border: 1px solid var(--rule); border-radius: 3px; background: var(--paper);
    color: var(--ink); padding: 0.5rem 0.6rem; outline: none; resize: vertical;
    min-height: 70px; line-height: 1.6; transition: border-color 0.18s;
  }
  .settings-cats-input:focus { border-color: var(--accent); }
  .settings-cats-label {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); display: block;
    margin-bottom: 0.3rem; margin-top: 0.5rem;
  }
  .delete-tab-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    background: none; border: 1px solid #ddd; color: var(--muted);
    padding: 0.25rem 0.5rem; border-radius: 3px; cursor: pointer; transition: all 0.15s;
  }
  .delete-tab-btn:hover { border-color: #cc3333; color: #cc3333; }
  .add-tab-section {
    margin-top: 1.5rem; padding: 1rem;
    background: #fff; border: 1px dashed var(--rule); border-radius: 4px;
  }
  .add-tab-title { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; margin-bottom: 0.75rem; }
  .settings-input {
    font-family: 'Source Serif 4', serif; font-size: 0.875rem; width: 100%;
    border: 1px solid var(--rule); border-radius: 3px; background: var(--paper);
    color: var(--ink); padding: 0.45rem 0.6rem; outline: none;
    margin-bottom: 0.6rem; transition: border-color 0.18s;
  }
  .settings-input:focus { border-color: var(--accent); }
  .save-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--accent); border: none; color: #fff;
    padding: 0.55rem 1.25rem; border-radius: 3px; cursor: pointer; transition: background 0.18s;
  }
  .save-btn:hover { background: var(--accent-light); }
  .add-tab-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: none; border: 1px solid var(--ink); color: var(--ink);
    padding: 0.45rem 1rem; border-radius: 3px; cursor: pointer;
    transition: all 0.18s; margin-top: 0.5rem;
  }
  .add-tab-btn:hover { background: var(--ink); color: var(--paper); }

  /* API KEY SECTION */
  .api-key-section {
    background: #fff; border: 1px solid var(--rule); border-radius: 4px;
    padding: 1rem; margin-bottom: 1.5rem;
  }
  .api-key-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
  .api-key-input {
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; flex: 1;
    border: 1px solid var(--rule); border-radius: 3px; background: var(--paper);
    color: var(--ink); padding: 0.45rem 0.6rem; outline: none; transition: border-color 0.18s;
    letter-spacing: 0.04em;
  }
  .api-key-input:focus { border-color: var(--accent); }
  .api-key-save-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 600;

const SEEN_LOG_KEY = 'stacks_seen_titles';
const SEEN_MAX = 300;

function loadSeenTitles() {
  try { return new Set(JSON.parse(localStorage.getItem(SEEN_LOG_KEY) || '[]')); }
  catch(e) { return new Set(); }
}

function saveSeenTitles(set) {
  const arr = [...set];
  // Keep only the most recent SEEN_MAX entries
  localStorage.setItem(SEEN_LOG_KEY, JSON.stringify(arr.slice(-SEEN_MAX)));
}

function recordSeenArticles(batch) {
  const seen = loadSeenTitles();
  batch.forEach(a => seen.add(a.title));
  saveSeenTitles(seen);
}

function filterSeen(candidates) {
  const seen = loadSeenTitles();
  return candidates.filter(a => !seen.has(a.title));

function todayKey() { return new Date().toISOString().slice(0,10); }
function thisWeekKey() {
  const d = new Date(), day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (day===0?6:day-1));
  return mon.toISOString().slice(0,10);
}

async function refreshAICategories() {
  const key = getApiKey();
  if (!key) { console.log('[Stacks] No API key — skipping AI refresh'); return; }
  const stored = localStorage.getItem('stacks_ai_cats_v1');
  if (stored) {
    const parsed = JSON.parse(stored);
    if (parsed.date === todayKey()) { applyAICategories(parsed.cats); return; }
  }
  console.log('[Stacks] Fetching AI categories…');
  const wikiTabs = tabs.filter(t => !t.tabType);
  const prompt = `You are helping expand a curated Wikipedia reading app. For each topic tab below, generate 30-40 additional Wikipedia category names that complement the existing ones. Categories must be real Wikipedia category names (use underscores). Emphasize specific events, movements, people, and phenomena — not broad overview categories. Focus on non-Western history, obscure but substantive topics. Return ONLY a JSON object mapping tab IDs to arrays of category strings. No explanation, no markdown, no prose.\n\nTabs:\n${wikiTabs.map(t => `"${t.id}" (${t.name}): [${t.categories.slice(0,8).join(', ')}...]`).join('\n')}`;
  // Try direct first (works in some environments), fall back to CORS proxy
  const AI_ENDPOINT = 'https://api.anthropic.com/v1/messages';
  const AI_PROXY    = 'https://corsproxy.io/?url=' + encodeURIComponent(AI_ENDPOINT);

  const body = JSON.stringify({
    model: 'claude-haiku-4-5-20251001',
    max_tokens: 4096,
    messages: [{ role: 'user', content: prompt }]
  });
  const headers = {
    'x-api-key': key,
    'anthropic-version': '2023-06-01',
    'content-type': 'application/json',
    'anthropic-dangerous-direct-browser-calls': 'true'
  };

  let res = null;
  for (const url of [AI_ENDPOINT, AI_PROXY]) {
    try {
      res = await fetch(url, { method: 'POST', headers, body });
      if (res.ok) break;
      const errText = await res.text().catch(() => '');
      console.log('[Stacks] AI attempt failed', url, res.status, errText.slice(0, 200));
      res = null;
    } catch(e) {
      console.log('[Stacks] AI fetch exception', url, e.message);
      res = null;
    }
  }

  if (!res) { console.log('[Stacks] All AI endpoints failed'); return; }

  try {
    const data = await res.json();
    const raw = data.content?.[0]?.text || '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) { console.log('[Stacks] AI returned no JSON. Raw:', raw.slice(0, 300)); return; }
    const cats = JSON.parse(jsonMatch[0]);
    localStorage.setItem('stacks_ai_cats_v1', JSON.stringify({ date: todayKey(), cats }));
    applyAICategories(cats);
    console.log('[Stacks] AI categories applied successfully');
  } catch(e) { console.log('[Stacks] AI response parse failed:', e.message); }
}

function applyAICategories(cats) {
  tabs.forEach(tab => {
    if (tab.tabType) return;
    const aiCats = cats[tab.id];
    if (!Array.isArray(aiCats)) return;
    tab._aiCategories = aiCats;
    tab._mergedCategories = [...new Set([...tab.categories, ...aiCats])];
  });
}

// 70% draw from AI-generated categories when available
function getEffectiveCategories(tab) {
  if (tab._aiCategories?.length && Math.random() < 0.7) return tab._aiCategories;
  return tab._mergedCategories || tab.categories;
}

const YT_VIDEO_CACHE_KEY = 'stacks_yt_videos_v1';
const YT_VIDEO_WEEK_KEY  = 'stacks_yt_video_week';

// Build keyword queries from current tab categories (static + AI)
function buildYtKeywords() {
  // Curated fallback queries covering the main tab themes
  const fallback = [
    'history documentary long form',
    'space exploration deep dive',
    'geopolitics world affairs analysis',
    'ancient civilizations documentary',
    'physics cosmology lecture',
    'economics history documentary',
    'philosophy religion history',
    'naval history warfare documentary',
    'cold war history documentary',
    'medieval history lecture',
    'astronomy astrophysics explained',
    'military history deep dive',
  ];

  // Pull keywords from AI categories if available
  const aiKeywords = [];
  tabs.filter(t => !t.tabType && t._aiCategories?.length).forEach(tab => {
    // Convert category names to readable search terms
    const sample = tab._aiCategories.slice(0, 6).map(c =>
      c.replace(/_/g,' ').replace(/\(.*?\)/g,'').trim().toLowerCase()
    ).filter(s => s.length > 4 && s.length < 40);
    if (sample.length) aiKeywords.push(sample[Math.floor(Math.random()*sample.length)] + ' documentary');
  });

  // Also add from static categories
  tabs.filter(t => !t.tabType && t.categories?.length).forEach(tab => {
    const sample = tab.categories.slice(0, 4).map(c =>
      c.replace(/_/g,' ').replace(/\(.*?\)/g,'').trim().toLowerCase()
    ).filter(s => s.length > 4 && s.length < 40);
    if (sample.length) aiKeywords.push(sample[Math.floor(Math.random()*sample.length)] + ' history');
  });

  const combined = [...new Set([...aiKeywords, ...fallback])];
  // Return 8 random queries for this fetch session
  return combined.sort(() => Math.random()-0.5).slice(0, 8);
}

async function fetchYouTubeVideos() {
  // Return session cache if fresh
  if (ytCache.fetched && ytCache.items?.length) return ytCache.items;

  // Return weekly localStorage cache if still valid
  const stored = localStorage.getItem(YT_VIDEO_CACHE_KEY);
  const storedWeek = localStorage.getItem(YT_VIDEO_WEEK_KEY);
  if (stored && storedWeek === thisWeekKey()) {
    const cached = JSON.parse(stored);
    ytCache.items = cached; ytCache.fetched = true;
    return cached;
  }

  const ytKey = getYtApiKey();
  if (!ytKey) {
    console.log('[Stacks] No YouTube API key — video tab needs a key in Settings');
    return [];
  }

  const queries = buildYtKeywords();
  const allItems = [];
  const seenVideoIds = new Set();

  for (const query of queries) {
    try {
      const url = new URL('https://www.googleapis.com/youtube/v3/search');
      url.searchParams.set('part', 'snippet');
      url.searchParams.set('q', query);
      url.searchParams.set('type', 'video');
      url.searchParams.set('videoDuration', 'long'); // >20 min
      url.searchParams.set('videoEmbeddable', 'true');
      url.searchParams.set('relevanceLanguage', 'en');
      url.searchParams.set('maxResults', '5');
      url.searchParams.set('order', 'relevance');
      url.searchParams.set('key', ytKey);

      const res = await fetch(url.toString());
      if (!res.ok) { console.log('[Stacks] YT search error:', res.status, query); continue; }
      const data = await res.json();

      (data.items || []).forEach(item => {
        const videoId = item.id?.videoId; if (!videoId || seenVideoIds.has(videoId)) return;
        seenVideoIds.add(videoId);
        const snippet = item.snippet || {};
        allItems.push({
          type: 'video',
          title: snippet.title || '',
          extract: snippet.description?.slice(0, 200) || 'Educational deep-dive video.',
          thumbnail: snippet.thumbnails?.high?.url || snippet.thumbnails?.default?.url || `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`,
          url: `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`,
          extUrl: `https://www.youtube.com/watch?v=${videoId}`,
          sourceName: snippet.channelTitle || 'YouTube',
          sourceColor: '#006655',
          tabId: 'video',
          videoId,
          publishedAt: snippet.publishedAt || '',
          readTime: 'Video',
          id: 'yt_' + videoId
        });
      });
    } catch(e) { console.log('[Stacks] YT search failed:', query, e.message); }
  }

  // Sort newest first, cache
  allItems.sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  ytCache.items = allItems; ytCache.fetched = true;
  if (allItems.length) {
    try {
      localStorage.setItem(YT_VIDEO_CACHE_KEY, JSON.stringify(allItems));
      localStorage.setItem(YT_VIDEO_WEEK_KEY, thisWeekKey());
    } catch(e) {} // storage quota
  }
  console.log(`[Stacks] YouTube: ${allItems.length} videos from ${queries.length} searches`);
  return allItems;
}

      metaEl.textContent=(obj.artistDisplayName||'Unknown')+(obj.objectDate?', '+obj.objectDate:'');
      card.style.cursor='pointer';
      card.addEventListener('click',()=>window.open(`https://www.metmuseum.org/art/collection/search/${obj.objectID}`,'_blank'));
    }catch(e){titleEl.textContent='Work unavailable';}
  })();
  return card;
}

async function makeSpaceTile() {
  const card=document.createElement('div'); card.className='card beauty-tile';
  const imgWrap=document.createElement('div'); imgWrap.style.cssText='width:100%;height:200px;overflow:hidden;flex-shrink:0;background:#000;';
  const body=document.createElement('div'); body.className='beauty-body';
  const label=document.createElement('div'); label.className='beauty-label'; label.textContent='— NASA APOD —';
  const titleEl=document.createElement('div'); titleEl.className='beauty-title'; titleEl.textContent='Loading…';
  const metaEl=document.createElement('div'); metaEl.className='beauty-meta';
  body.appendChild(label); body.appendChild(titleEl); body.appendChild(metaEl);
  card.appendChild(imgWrap); card.appendChild(body);
  (async()=>{
    const images=await fetchAPODImages(); if(!images.length){titleEl.textContent='No image available';return;}
    const apod=images[Math.floor(Math.random()*images.length)];
    const img=document.createElement('img'); img.src=apod.url; img.alt=apod.title; img.className='beauty-art-img';
    imgWrap.appendChild(img);
    titleEl.textContent=apod.title;

}

function injectBeautyTile(grid) {
  // Weights: art 55%, space 30%, poem 10%, quote 5%
  const roll = Math.random();
  if (roll < 0.55) grid.appendChild(makeArtTile());
  else if (roll < 0.85) makeSpaceTile().then(t => { if(t) grid.appendChild(t); });
  else if (roll < 0.95) grid.appendChild(makePoemTile());
  else grid.appendChild(makeQuoteTile());
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
function setStatus(s) {
  const d = document.getElementById('statusDot');
  d.className = 'status-dot' + (s ? ' '+s : '');
}

function estimateReadTime(text) {
  return Math.max(1, Math.round((text||'').trim().split(/\s+/).length / 200)) + ' min read';
}

function trimSummary(text) {
  let c = text
    .replace(/\([^)]*\/[^)]*\/[^)]*\)/g, '')
    .replace(/\(\s*[a-zA-Z]{1,5}:\s*\/[^)]+\/[^)]*\)/g, '')
    .replace(/\s{2,}/g, ' ').trim();
  const sents = c.match(/[^.!?]+[.!?]+/g) || [c];
  return sents.slice(0, 3).join(' ').trim();
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';
  return (d.textContent || d.innerText || '').replace(/\s{2,}/g,' ').trim();
}

const SKIP_RX = [
  /^list of /i, /^index of /i, /^\d{4}$/, /disambiguation/i,
  /^(january|february|march|april|may|june|july|august|september|october|november|december)\b/i,
  /municipality/i, /\b(township|village|parish|borough) of\b/i,
  /^elections in\b/i, /^politics of\b/i,
  /^geography of\b/i, /^outline of\b/i, /^culture of\b/i,
  /^economy of\b/i, /\bdemography\b/i, /^demographics\b/i
];

function shouldSkip(title, extract) {
  if (!title || title.length < 5) return true;
  for (const rx of SKIP_RX) if (rx.test(title)) return true;
  if (!extract || extract.trim().length < 200) return true;
  return false;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function getTab(id) { return tabs.find(t => t.id === id); }
function getTabColor(id) { return getTab(id)?.color || '#333'; }
function getTabName(id) { return getTab(id)?.name || id; }

// ─────────────────────────────────────────────────────────────────────────────
// WIKIPEDIA API — batched multi-title fetch (1 API call for all articles)
// ─────────────────────────────────────────────────────────────────────────────
const categoryMemberCache = {};

async function fetchCategoryMembers(category) {
  if (categoryMemberCache[category]) return categoryMemberCache[category];
  const url = `https://en.wikipedia.org/w/api.php?action=query&list=categorymembers`
    + `&cmtitle=Category:${encodeURIComponent(category)}&cmlimit=80&cmtype=page&format=json&origin=*`;
  const data = await (await fetch(url)).json();
  const members = data?.query?.categorymembers || [];
  categoryMemberCache[category] = members;
  return members;
}

// Fetch extracts + thumbnails for up to 20 titles in ONE API call
async function fetchArticlesBatch(candidates) {
  // candidates: array of { title, tabId, category, pageid }
  if (!candidates.length) return [];
  const titles = candidates.map(c => c.title).join('|');
  const url = `https://en.wikipedia.org/w/api.php?action=query`
    + `&prop=extracts|pageimages&exintro=true&explaintext=true`
    + `&piprop=thumbnail&pithumbsize=600`
    + `&titles=${encodeURIComponent(titles)}&format=json&origin=*`;
  const data = await (await fetch(url)).json();
  const pages = data?.query?.pages || {};
  // Map results back by normalised title
  return Object.values(pages).map(page => {
    const candidate = candidates.find(c =>
      c.title.toLowerCase() === (page.title || '').toLowerCase()
    ) || candidates.find(c => String(c.pageid) === String(page.pageid));
    if (!candidate) return null;
    return {
      candidate,
      extract: page.extract || '',
      thumbnail: page.thumbnail?.source || null
    };
  }).filter(Boolean);
}

// Pick candidate members from a tab's categories (all category fetches in parallel)
async function pickWikiCandidates(tabId, n = 4) {
  const tab = getTab(tabId);
  if (!tab) return [];
  const cats = getEffectiveCategories(tab);
  if (!cats.length) return [];

  // Pick n different categories, fetch their members in parallel
  const selectedCats = [];
  const shuffledCats = [...cats].sort(() => Math.random()-0.5);
  for (let i = 0; i < Math.min(n, shuffledCats.length); i++) {
    selectedCats.push(shuffledCats[i]);
  }

  const memberResults = await Promise.allSettled(selectedCats.map(c => fetchCategoryMembers(c)));
  const candidates = [];
  memberResults.forEach((r, i) => {
    if (r.status !== 'fulfilled' || !r.value.length) return;
    const members = r.value;
    const shuffled = [...members].sort(() => Math.random()-0.5).slice(0, 3);
    shuffled.forEach(m => candidates.push({ ...m, tabId, category: selectedCats[i] }));
  });
  return candidates;
}

// Main Wikipedia batch fetch: given a list of tabIds, fetch all articles in 2 round trips
async function fetchWikiArticlesForTabs(tabIds, targetCount) {
  if (!tabIds.length) return [];

  // 1. Collect candidates from all tabs simultaneously
  const candidateGroups = await Promise.allSettled(
    tabIds.map(id => pickWikiCandidates(id, 3))
  );
  const allCandidates = candidateGroups
    .flatMap(r => r.status === 'fulfilled' ? r.value : [])
    .filter(c => !SKIP_RX.some(rx => rx.test(c.title)));

  if (!allCandidates.length) return [];

  // Deduplicate candidates by title, shuffle for variety
  const seen = new Set();
  const unique = allCandidates.filter(c => {
    if (seen.has(c.title)) return false;
    seen.add(c.title); return true;
  }).sort(() => Math.random()-0.5);

  // 2. ONE batched API call for up to 20 candidates
  const toFetch = unique.slice(0, 20);
  let batchResults = [];
  try {
    batchResults = await fetchArticlesBatch(toFetch);
  } catch(e) {
    console.log('[Stacks] Wiki batch fetch failed:', e.message);
    return [];
  }

  // 3. Filter, skip seen titles, build article objects
  const seenLog = loadSeenTitles();
  const articles = [];

  for (const { candidate, extract, thumbnail } of batchResults) {
    if (articles.length >= targetCount) break;
    if (shouldSkip(candidate.title, extract)) continue;
    if (seenLog.has(candidate.title)) continue;
    articles.push({
      type: 'wiki',
      title: candidate.title,
      extract: trimSummary(extract),
      thumbnail,
      tabId: candidate.tabId,
      category: candidate.category,
      readTime: estimateReadTime(extract),
      id: (candidate.pageid || Math.random()) + '_' + Math.random()
    });
  }

  return articles;
}

// ─────────────────────────────────────────────────────────────────────────────
// RSS — direct fetch via CORS proxy, full XML parsing
// ─────────────────────────────────────────────────────────────────────────────
function parseRSSXML(xmlText, source) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'application/xml');

    // Check for parse error
    if (doc.querySelector('parsererror')) {
      console.log(`[Stacks] XML parse error for ${source.name}`);
      return [];
    }

    // Support both RSS <item> and Atom <entry>
    const items = [...doc.querySelectorAll('item, entry')];
    return items.map(item => {
      // Title — strip CDATA
      const title = (item.querySelector('title')?.textContent || '').trim();

      // Link — RSS uses text content, Atom uses href attribute
      let link = '';
      const linkEl = item.querySelector('link');
      if (linkEl) {
        link = linkEl.getAttribute('href') || linkEl.textContent?.trim() || '';
      }
      // Atom fallback: <link rel="alternate">
      if (!link) {
        const altLink = item.querySelector('link[rel="alternate"]');
        link = altLink?.getAttribute('href') || '';
      }

      // Description/content — try multiple selectors in order of preference
      let raw = '';
      const contentEncoded = item.getElementsByTagNameNS('http://purl.org/rss/1.0/modules/content/', 'encoded')[0];
      if (contentEncoded) {
        raw = stripHtml(contentEncoded.textContent || '');
      } else {
        const descEl = item.querySelector('description') || item.querySelector('summary') || item.querySelector('content');
        raw = stripHtml(descEl?.textContent || '');
      }
      const summary = raw.match(/[^.!?]+[.!?]+/g)?.slice(0,3).join(' ').trim() || raw.slice(0,300);

      // Thumbnail: try media:thumbnail, enclosure, then first img in content
      let thumb = null;
      const mediaThumbnail = item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'thumbnail')[0];
      if (mediaThumbnail) thumb = mediaThumbnail.getAttribute('url');

      if (!thumb) {
        const mediaContent = item.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'content')[0];
        if (mediaContent && mediaContent.getAttribute('medium') === 'image') {
          thumb = mediaContent.getAttribute('url');
        }
      }
      if (!thumb) {
        const enc = item.querySelector('enclosure');
        if (enc && (enc.getAttribute('type') || '').startsWith('image')) thumb = enc.getAttribute('url');
      }
      if (!thumb) {
        // Search raw HTML of content for img src
        const contentEl = item.querySelector('content') || contentEncoded;
        const htmlStr = contentEl?.textContent || item.querySelector('description')?.textContent || '';
        const m = htmlStr.match(/<img[^>]+src=["']([^"']+)["']/i);
        if (m) thumb = m[1];
      }

      // Parse publish date for recency sorting
      const pubRaw = item.querySelector('pubDate')?.textContent || item.querySelector('published')?.textContent || item.querySelector('updated')?.textContent || '';
      return {
        type: 'rss', title,
        extract: summary || title,
        thumbnail: thumb,
        url: link,
        sourceName: source.name,
        sourceColor: source.color,
        tabIds: source.tabIds || [],
        readTime: estimateReadTime(raw),
        publishedAt: pubRaw ? new Date(pubRaw).getTime() : 0,
        id: 'rss_' + source.name + '_' + Math.random()
      };
    }).filter(a => a.title.length > 5 && (a.extract || a.title).length > 20);
  } catch(e) {
    console.log('[Stacks] XML parse error:', e.message);
    return [];
  }
}

async function fetchRSSSource(source) {
  if (rssCache[source.url]) return rssCache[source.url];

  // Try two different CORS proxies in sequence
  const proxies = [
    'https://corsproxy.io/?url=',
    'https://api.allorigins.win/raw?url='
  ];

  for (const proxy of proxies) {
    try {
      const proxyUrl = proxy + encodeURIComponent(source.url);
      const res = await fetch(proxyUrl);
      if (!res.ok) {
        console.log(`[Stacks] RSS HTTP ${res.status} via ${proxy}: ${source.name}`);
        continue;
      }
      const text = await res.text();
      if (!text || text.length < 100) { console.log(`[Stacks] RSS empty response: ${source.name}`); continue; }
      const items = parseRSSXML(text, source);
      if (!items.length) { console.log(`[Stacks] RSS parsed 0 items: ${source.name}`); continue; }
      console.log(`[Stacks] RSS ok: ${source.name} — ${items.length} items`);
      // Sort newest-first before caching
      items.sort((a,b) => (b.publishedAt||0) - (a.publishedAt||0));
      rssCache[source.url] = items;
      return items;
    } catch(e) {
      console.log(`[Stacks] RSS exception via ${proxy}: ${source.name}`, e.message);
    }
  }
  return [];
}

async function fetchOneRSSArticle(tabId) {
  const seenLog = loadSeenTitles();
  const matching = RSS_SOURCES.filter(s => s.tabIds.includes(tabId)).sort(() => Math.random()-0.5);
  if (!matching.length) return null;
  for (const source of matching) {
    const items = await fetchRSSSource(source);
    if (!items.length) continue;
    // Prefer unseen items from the recent half of the feed
    const half = Math.ceil(items.length / 2);
    const recentUnseen = items.slice(0, half).filter(i => !seenLog.has(i.title));
    const anyUnseen = items.filter(i => !seenLog.has(i.title));
    const pool = recentUnseen.length ? recentUnseen : anyUnseen.length ? anyUnseen : items;
    return { ...pick(pool), tabId, id: 'rss_'+tabId+'_'+Math.random() };
  }
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// PUBMED — NLM E-utilities API
// ─────────────────────────────────────────────────────────────────────────────
async function fetchPubMedArticles() {
  if (pubmedCache.fetched && pubmedCache.items.length) return pubmedCache.items;
  try {
    // Pick 4 random search terms and run them in parallel for variety
    const selectedTerms = [...PUBMED_SEARCH_TERMS].sort(() => Math.random()-0.5).slice(0, 4);

    const searchResults = await Promise.allSettled(selectedTerms.map(async term => {
      const url = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi`
        + `?db=pubmed&term=${encodeURIComponent(term + '[Title/Abstract]')}`
        + `&sort=pub+date&retmax=20&retmode=json&datetype=pdat&reldate=365`;
      const res = await fetch(url);
      const data = await res.json();
      return data?.esearchresult?.idlist || [];
    }));

    // Combine and deduplicate IDs
    const allIds = [...new Set(
      searchResults.flatMap(r => r.status === 'fulfilled' ? r.value : [])
    )].slice(0, 60);

    if (!allIds.length) return [];

    // Fetch summaries
    const summaryUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi`
      + `?db=pubmed&id=${allIds.join(',')}&retmode=json`;
    const summaryRes = await fetch(summaryUrl);
    const summaryData = await summaryRes.json();
    const result = summaryData?.result || {};

    // Fetch abstracts in batch (first 40)
    const fetchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi`
      + `?db=pubmed&id=${allIds.slice(0,40).join(',')}&rettype=abstract&retmode=xml`;
    const fetchRes = await fetch(fetchUrl);
    const xmlText = await fetchRes.text();
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
    const abstractMap = {};
    xmlDoc.querySelectorAll('PubmedArticle').forEach(art => {
      const pmid = art.querySelector('PMID')?.textContent;
      const abstractTexts = [...art.querySelectorAll('AbstractText')].map(el => el.textContent).join(' ');
      if (pmid && abstractTexts) abstractMap[pmid] = abstractTexts;
    });

    const items = allIds.map(id => {
      const s = result[id];
      if (!s || !s.title) return null;
      const abstract = abstractMap[id] || '';
      const extract = abstract ? trimSummary(abstract) : s.title;
      return {
        type: 'pubmed',
        title: s.title,
        extract: extract || 'No abstract available.',
        thumbnail: null,
        url: `https://pubmed.ncbi.nlm.nih.gov/${id}/`,
        sourceName: s.fulljournalname || s.source || 'PubMed',
        sourceColor: '#003c64',
        tabId: 'medical',
        readTime: estimateReadTime(abstract || s.title),
        pmid: id,
        pubDate: s.pubdate || '',
        authors: (s.authors || []).slice(0,3).map(a => a.name).join(', '),
        id: 'pubmed_' + id
      };
    }).filter(Boolean).filter(a => a.title.length > 10);

    pubmedCache.items = items;
    pubmedCache.fetched = true;
    console.log(`[Stacks] PubMed: ${items.length} articles loaded`);
    return items;
  } catch(e) {
    console.log('[Stacks] PubMed fetch failed:', e.message);
    return [];
  }
}

async function fetchOnePubMedArticle() {
  const items = await fetchPubMedArticles();
  if (!items.length) return null;
  const seen = new Set(articles.filter(a => a.type === 'pubmed').map(a => a.pmid));
  const pool = items.filter(i => !seen.has(i.pmid));
  return pool.length ? pick(pool) : pick(items);
}

// ─────────────────────────────────────────────────────────────────────────────
// HUMANITIES RSS
// ─────────────────────────────────────────────────────────────────────────────
async function fetchHumanitiesRSS() {
  const humanitiesTab = getTab('humanities');
  const topics = humanitiesTab?.topics || [];

  // Pick 2-3 random sources, fetch them
  const shuffled = [...HUMANITIES_RSS_SOURCES].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, 3);

  const allItems = [];
  for (const source of selected) {
    const items = await fetchRSSSource({...source, tabIds: ['humanities']});
    allItems.push(...items.map(i => ({
      ...i, tabId: 'humanities', sourceColor: source.color,
      type: 'humanities'
    })));
  }

  // If we have topics and an API key, try to filter/match by topic keywords
  if (topics.length && allItems.length) {
    const topicWords = topics.flatMap(t => t.toLowerCase().split(/\s+/));
    const scored = allItems.map(a => {
      const text = (a.title + ' ' + a.extract).toLowerCase();
      const score = topicWords.filter(w => text.includes(w)).length;
      return { ...a, _score: score };
    });
    scored.sort((a,b) => b._score - a._score);
    return scored;
  }
  return allItems;
}

async function fetchOneHumanitiesArticle() {
  const items = await fetchHumanitiesRSS();
  if (!items.length) return null;
  const seen = new Set(articles.filter(a => a.type === 'humanities').map(a => a.title));
  const pool = items.filter(i => !seen.has(i.title));
  return pool.length ? pick(pool) : pick(items);
}

// ─────────────────────────────────────────────────────────────────────────────
// BATCH FETCH
// ─────────────────────────────────────────────────────────────────────────────
async function fetchBatch(count = 6) {
  const activeList = [...activeTabs];
  if (!activeList.length) return [];

  const hasMedical = activeList.includes('medical');
  const hasHumanities = activeList.includes('humanities');
  const hasVideo = activeList.includes('video');
  const wikiTabIds = activeList.filter(id => !getTab(id)?.tabType);
  const rssEligible = wikiTabIds.filter(id => RSS_SOURCES.some(s => s.tabIds.includes(id)));

  const [rss1, rss2, pubmed1, pubmed2, hum1, hum2, vid1, wikiArticles] = await Promise.allSettled([
    rssEligible.length ? fetchOneRSSArticle(pick(rssEligible)) : Promise.resolve(null),
    rssEligible.length ? fetchOneRSSArticle(pick(rssEligible)) : Promise.resolve(null),
    hasMedical ? fetchOnePubMedArticle() : Promise.resolve(null),
    hasMedical && count >= 6 ? fetchOnePubMedArticle() : Promise.resolve(null),
    hasHumanities ? fetchOneHumanitiesArticle() : Promise.resolve(null),
    hasHumanities && count >= 6 ? fetchOneHumanitiesArticle() : Promise.resolve(null),
    hasVideo ? fetchOneVideoArticle() : Promise.resolve(null),
    wikiTabIds.length ? fetchWikiArticlesForTabs(wikiTabIds, count) : Promise.resolve([])
  ]);

  const specials = [rss1, rss2, pubmed1, pubmed2, hum1, hum2, vid1]
    .filter(r => r.status === 'fulfilled' && r.value)
    .map(r => r.value);

  const wikiGood = (wikiArticles.status === 'fulfilled' ? wikiArticles.value : []) || [];

  // Interleave: special sources at positions 0, 2, 4; wiki fills the rest
  const combined = [];
  const seenTitles = new Set();
  let si = 0, wi = 0;
  while (combined.length < count) {
    // Every other slot try a special source
    const useSpecial = (combined.length % 3 === 1) && si < specials.length;
    const candidate = useSpecial ? specials[si++] : (wi < wikiGood.length ? wikiGood[wi++] : (si < specials.length ? specials[si++] : null));
    if (!candidate) break;
    if (seenTitles.has(candidate.title)) continue;
    seenTitles.add(candidate.title);
    combined.push(candidate);
  }

  return combined;
}

// ─────────────────────────────────────────────────────────────────────────────
// PRE-FETCH QUEUE — silently fills next batch while user reads
// ─────────────────────────────────────────────────────────────────────────────
let prefetchedBatch = null;
let prefetchInProgress = false;

async function prefetchNextBatch() {
  if (prefetchInProgress || prefetchedBatch) return;
  prefetchInProgress = true;
  try {
    prefetchedBatch = await fetchBatch(6);
  } catch(e) {
    prefetchedBatch = null;
  }
  prefetchInProgress = false;
}

async function getNextBatch() {
  if (prefetchedBatch && prefetchedBatch.length) {
    const batch = prefetchedBatch;
    prefetchedBatch = null;
    // Start pre-fetching the one after this immediately
    setTimeout(prefetchNextBatch, 300);
    return batch;
  }
  return fetchBatch(6);
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function isAllActive() {
  // Video tab is always excluded from "All"
  return tabs.filter(t => t.id !== 'video').every(t => activeTabs.has(t.id));
}

function toggleAll() {
  if (isAllActive()) {
    activeTabs = new Set([tabs[0].id]);
  } else {
    // Activate everything except video
    activeTabs = new Set(tabs.filter(t => t.id !== 'video').map(t => t.id));
  }
  saveState(); renderTabBar(); refreshFeed();
}

function renderTabBar() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';

  // "All" pill — always first
  const allPill = document.createElement('button');
  allPill.className = 'tab-pill-all' + (isAllActive() ? ' all-active' : '');
  allPill.textContent = 'All';
  allPill.addEventListener('click', toggleAll);
  bar.appendChild(allPill);

  tabs.forEach(tab => {
    const pill = document.createElement('button');
    const isVideo = tab.id === 'video';
    pill.className = 'tab-pill' + (activeTabs.has(tab.id) ? ' active' : '') + (isVideo ? ' video-tab' : '');
    pill.textContent = tab.name;
    pill.addEventListener('click', () => toggleTab(tab.id));
    bar.appendChild(pill);
  });
}

function toggleTab(tabId) {
  activeTabs.has(tabId) ? activeTabs.delete(tabId) : activeTabs.add(tabId);
  saveState(); renderTabBar(); refreshFeed();
}

function appendArticles(newArticles) {
  const grid = document.getElementById('cardGrid');
  newArticles.forEach(a => {
    grid.appendChild(makeCard(a));
    articles.push(a);
    // Inject beauty/pause tile at random intervals (skip for video-only feeds)
    if (a.tabId !== 'video' && shouldInjectBeauty()) {
      injectBeautyTile(grid);
    }
  });
  recordSeenArticles(newArticles);

function makeCard(article) {
  if (article.type === 'video') return makeVideoCard(article);
  const card = document.createElement('div');
  card.className = 'card';

  const isPubMed = article.type === 'pubmed';
  const isHumanities = article.type === 'humanities';
  const isRSS = article.type === 'rss';
  const tabColor = isPubMed ? '#003c64' : isHumanities ? '#3c1450' : isRSS ? (article.sourceColor || '#333') : getTabColor(article.tabId);
  const tabName = getTabName(article.tabId);
  const glyph = TAB_GLYPHS[article.tabId] || '◆';
  const isRecent = isRSS || isPubMed || isHumanities || RECENT_CATS.has(article.category);

  // Image block
  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img-wrap';

  if (article.thumbnail) {
    const img = document.createElement('img');
    img.src = article.thumbnail;
    img.alt = article.title;
    img.loading = 'lazy';
    img.onerror = () => {
      imgWrap.innerHTML = `<div class="card-img-placeholder"><span class="card-img-glyph">${glyph}</span></div>`;
      if (isRSS || isPubMed || isHumanities) addSourceStripe(imgWrap, article.sourceName);
    };
    imgWrap.appendChild(img);
  } else {
    imgWrap.innerHTML = `<div class="card-img-placeholder"><span class="card-img-glyph">${glyph}</span></div>`;
  }

  if (isRSS || isPubMed || isHumanities) addSourceStripe(imgWrap, article.sourceName);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  const tagsRow = document.createElement('div');
  tagsRow.className = 'card-tags-row';

  const tag = document.createElement('span');
  tag.className = 'card-tag';
  tag.style.background = tabColor;
  tag.textContent = tabName;
  tagsRow.appendChild(tag);

  if (isRecent) {
    const badge = document.createElement('span');
    badge.className = 'card-badge' + (isPubMed ? ' pubmed' : isHumanities ? ' humanities' : '');
    if (isPubMed) badge.textContent = 'PubMed';
    else if (isHumanities) badge.textContent = 'Journal';
    else if (isRSS) badge.textContent = 'Live';
    else badge.textContent = 'Recent';
    tagsRow.appendChild(badge);
  }

  if (isPubMed && article.pubDate) {
    const dateBadge = document.createElement('span');
    dateBadge.className = 'card-badge pubmed';
    dateBadge.textContent = article.pubDate.slice(0,4);
    tagsRow.appendChild(dateBadge);
  }

  const titleEl = document.createElement('div');
  titleEl.className = 'card-title';
  titleEl.textContent = article.title;

  const extractEl = document.createElement('div');
  extractEl.className = 'card-extract';
  extractEl.textContent = article.extract;

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  const metaCol = document.createElement('div');
  metaCol.className = 'card-meta-col';
  const rt = document.createElement('span');
  rt.className = 'card-readtime';
  rt.textContent = article.readTime;
  metaCol.appendChild(rt);

  if (isPubMed && article.authors) {
    const byline = document.createElement('span');
    byline.className = 'card-byline';
    byline.textContent = article.authors;
    metaCol.appendChild(byline);
  } else if ((isRSS || isHumanities) && article.sourceName) {
    const byline = document.createElement('span');
    byline.className = 'card-byline';
    byline.textContent = article.sourceName;
    metaCol.appendChild(byline);
  }

  const arrow = document.createElement('span');
  arrow.className = 'card-arrow';
  arrow.textContent = '→';
  footer.appendChild(metaCol);
  footer.appendChild(arrow);

  body.appendChild(tagsRow);
  body.appendChild(titleEl);
  body.appendChild(extractEl);
  body.appendChild(footer);

  card.appendChild(imgWrap);
  card.appendChild(body);
  card.addEventListener('click', () => openReader(article));
  return card;
}

function addSourceStripe(imgWrap, name) {
  const stripe = document.createElement('div');
  stripe.className = 'card-img-source';
  stripe.textContent = name;
  imgWrap.appendChild(stripe);
}

async function refreshFeed() {
  if (isLoading) return;
  isLoading = true; articles = [];
  prefetchedBatch = null;
  prefetchInProgress = false;
  beautyCounter = 0;
  setStatus('loading');
  document.getElementById('feedLabel').textContent = 'Loading articles…';
  document.getElementById('loadMoreBtn').disabled = true;
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  renderSkeletons(4);

  // Fire initial fetch AND next-batch prefetch simultaneously
  // so "Load more" is instant the moment first batch renders
  const [batch] = await Promise.all([
    fetchBatch(4),
    // prefetch quietly in parallel — result stored in prefetchedBatch
    (async () => {
      if (prefetchInProgress || prefetchedBatch) return;
      prefetchInProgress = true;
      try { prefetchedBatch = await fetchBatch(6); } catch(e) { prefetchedBatch = null; }
      prefetchInProgress = false;
    })()
  ]);

  removeSkeletons();
  if (!activeTabs.size) {
    grid.innerHTML = '<div class="empty-state"><p>Select at least one topic tab above.</p></div>';
    setStatus(''); isLoading = false;
    document.getElementById('loadMoreBtn').disabled = false;
    document.getElementById('feedLabel').textContent = 'No topics selected';
    return;
  }
  appendArticles(batch);
  const n = articles.length;
  document.getElementById('feedLabel').textContent = `${n} article${n!==1?'s':''} loaded`;
  setStatus('ready'); isLoading = false;
  document.getElementById('loadMoreBtn').disabled = false;
}

async function loadMore() {
  if (isLoading) return;
  isLoading = true; setStatus('loading');
  document.getElementById('loadMoreBtn').disabled = true;
  document.getElementById('loadMoreBtn').textContent = 'Loading…';
  renderSkeletons(6);
  const batch = await getNextBatch();
  removeSkeletons();
  appendArticles(batch);
  const n = articles.length;
  document.getElementById('feedLabel').textContent = `${n} article${n!==1?'s':''} loaded`;
  setStatus('ready'); isLoading = false;
  document.getElementById('loadMoreBtn').disabled = false;
  document.getElementById('loadMoreBtn').textContent = 'Load more articles';
  // Pre-fetch again for next load more
  setTimeout(prefetchNextBatch, 300);
}

function openReader(article) {
  document.getElementById('readerTitle').textContent = article.title;
  const link = document.getElementById('readerExtLink');
  const iframe = document.getElementById('readerIframe');

  if (article.type === 'video') {
    link.href = article.extUrl || '#'; link.textContent = 'YouTube \u2197';
    iframe.src = article.url; // embed URL with autoplay
  } else if (article.type === 'pubmed') {
    link.href = article.url;
    link.textContent = 'PubMed ↗';
    iframe.src = article.url;
  } else if (article.type === 'rss' || article.type === 'humanities') {
    link.href = article.url || '#';
    link.textContent = (article.sourceName || 'Source') + ' ↗';
    iframe.src = article.url || '';
  } else {
    link.href = `https://en.wikipedia.org/wiki/${encodeURIComponent(article.title)}`;
    link.textContent = 'Wikipedia ↗';
    iframe.src = `https://en.m.wikipedia.org/wiki/${encodeURIComponent(article.title)}`;
  }
  document.getElementById('readerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeReader() {
  document.getElementById('readerOverlay').classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { document.getElementById('readerIframe').src = ''; }, 350);
}

function collectSettingsData() {
  return [...document.querySelectorAll('.settings-tab-row')].map(row => {
    const orig = tabs[parseInt(row.dataset.idx)];
    if (!orig) return null;
    return { ...orig,
      name: row.querySelector('[data-field="name"]')?.value.trim() || orig.name,
      categories: row.querySelector('[data-field="categories"]')
        ?.value.split(',').map(c=>c.trim()).filter(Boolean) || orig.categories
    };
  }).filter(Boolean);
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENTS + INIT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('readerBack').addEventListener('click', closeReader);
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsClose').addEventListener('click', closeSettings);
document.getElementById('refreshBtn').addEventListener('click', refreshFeed);
document.getElementById('loadMoreBtn').addEventListener('click', loadMore);
document.getElementById('saveSettingsBtn').addEventListener('click', () => {
  const wikiTabs = collectSettingsData();
  // Preserve special tabs
  const specialTabs = tabs.filter(t => t.tabType);
  tabs = [...wikiTabs, ...specialTabs];
  const valid = new Set(tabs.map(t=>t.id));
  activeTabs = new Set([...activeTabs].filter(id => valid.has(id)));
  if (!activeTabs.size && tabs.length) activeTabs.add(tabs[0].id);
  saveState(); closeSettings(); renderTabBar(); refreshFeed();
});
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('settingsOverlay').classList.contains('open')) closeSettings();
  else closeReader();
});

(async function init() {
  document.getElementById('mastheadDate').textContent = new Date().toLocaleDateString('en-US',{
    weekday:'short', year:'numeric', month:'short', day:'numeric'
  });
  setSessionQuote();
  // Register service worker for PWA install support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  loadState();
  renderTabBar();
  // Background non-blocking warm-ups
  refreshAICategories().then(() => renderTabBar());
  fetchAPODImages(); // warm up APOD cache for beauty tiles
  refreshFeed();
})();
</script>
</body>
</html>
